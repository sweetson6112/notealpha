version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cha_user
      POSTGRES_PASSWORD: cha_password
      POSTGRES_DB: cha_bills
    volumes:
      - cha_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      FLASK_ENV: production
      SECRET_KEY: change-this-to-a-long-random-string
      DATABASE_URL: postgresql://cha_user:cha_password@db:5432/cha_bills
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    command: >
      sh -c "flask db upgrade && python seed.py && gunicorn -c gunicorn.conf.py app:app"

volumes:
  cha_pg_data:

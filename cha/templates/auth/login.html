{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block guest_content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; background:#0b3d66;">
  <div class="card shadow-lg" style="width: 380px;">
    <div class="card-body p-4">
      <div class="text-center mb-3">
        <i class="bi bi-bank2" style="font-size:2.5rem; color:#0b3d66;"></i>
        <h5 class="mt-2 mb-0">CDRSL Bond Warehouse</h5>
        <div class="text-muted small">CHA Bills Approval Note Management System</div>
      </div>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-check mb-3">
          <input type="checkbox" name="remember" class="form-check-input" id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100">Log In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

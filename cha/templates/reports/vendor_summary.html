{% extends "base.html" %}
{% block title %}Vendor Summary{% endblock %}
{% block content %}
<h4 class="mb-3">Vendor Summary</h4>
<div class="card"><div class="card-body p-0">
<table class="table table-hover mb-0">
<thead><tr><th>Vendor</th><th>Invoice Count</th><th>Total Amount</th></tr></thead>
<tbody>
{% for vendor, data in summary.items() %}
<tr><td>{{ vendor }}</td><td>{{ data.count }}</td><td>{{ data.amount | inr }}</td></tr>
{% else %}
<tr><td colspan="3" class="text-muted text-center py-3">No data.</td></tr>
{% endfor %}
</tbody>
</table>
</div></div>
{% endblock %}

services:
  - type: web
    name: cha-bills-approval-note-system
    env: docker
    plan: starter
    healthCheckPath: /auth/login
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cha-bills-db
          property: connectionString
      - key: PORT
        value: 5000
    buildCommand: ""
    startCommand: "flask db upgrade && python seed.py && gunicorn -c gunicorn.conf.py app:app"

databases:
  - name: cha-bills-db
    plan: starter
    databaseName: cha_bills
    user: cha_user
